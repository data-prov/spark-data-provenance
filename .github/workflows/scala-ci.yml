name: Scala CI (scala-spark-data-provenance)

on:
  push:
    branches: ["**"]
    paths:
      - "scala-spark-data-provenance/**"
      - ".github/workflows/scala-ci.yml"
  pull_request:
    paths:
      - "scala-spark-data-provenance/**"
      - ".github/workflows/scala-ci.yml"

jobs:
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: scala-spark-data-provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Lint and format-check
        run: make check
