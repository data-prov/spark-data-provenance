name: Python Publish (pyspark-data-provenance)

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: release
    defaults:
      run:
        working-directory: pyspark-data-provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: make init-uv-python

      - name: Build wheel
        run: make build

      - name: Publish package
        run: make publish-from-ci
