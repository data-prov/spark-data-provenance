name: Python CI (pyspark-data-provenance)

on:
  push:
    branches: ["**"]
    paths:
      - "pyspark-data-provenance/**"
      - ".github/workflows/python-ci.yml"
  pull_request:
    paths:
      - "pyspark-data-provenance/**"
      - ".github/workflows/python-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: pyspark-data-provenance

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6

      - name: Install Python
        run: make init-uv-python

      - name: Sync dependencies
        run: make init

      - name: Lint and type-check
        run: make check

      - name: Run tests
        run: make test
